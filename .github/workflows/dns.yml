name: DNS

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: registryctl/go.mod

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        working-directory: registryctl
        run: go test ./...

      - name: Validate registry
        working-directory: registryctl
        run: go run . validate --root ..

  pr-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR files
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: base/registryctl/go.mod

      - name: Test
        working-directory: base/registryctl
        run: go test ./...

      - name: Check registry format and review requirement
        id: review
        continue-on-error: true
        working-directory: base/registryctl
        env:
          GITHUB_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: go run . review-check --base-root .. --head-root ../../head

      - name: Comment PR status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.review.outcome }}" != "success" ]; then
            body="Registry format check failed. See the workflow logs for parser or validation errors."
          elif [ "${{ steps.review.outputs.requires_review }}" = "true" ]; then
            body="Registry format check passed. This PR requires maintainer review because it is an initial registration or includes non-auto-mergeable changes."
          elif [ "${{ steps.review.outputs.auto_merge }}" = "true" ]; then
            body="Registry format check passed. This PR is eligible for auto-merge."
          else
            body="Registry format check passed."
          fi
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "$body"

      - name: Enable auto-merge
        if: steps.review.outcome == 'success' && steps.review.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --squash

      - name: Fail on registry errors
        if: steps.review.outcome != 'success'
        run: exit 1

  sync:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: BAKA.LIFE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: registryctl/go.mod

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ZONE_ID"

      - name: Sync Cloudflare DNS
        working-directory: registryctl
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: go run . sync --root ..
